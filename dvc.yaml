stages:
  preprocess:
    cmd: uv run python -m recomendador.data.prepare
    deps:
      - src/recomendador/data/prepare.py
      - src/recomendador/data/loader.py
      - src/recomendador/preprocessing/pipeline.py
      - data/raw/events.csv
    outs:
      - data/processed/clean.parquet

  feature_eng:
    cmd: uv run python -m recomendador.data.feature_eng
    deps:
      - src/recomendador/data/feature_eng.py
      - src/recomendador/preprocessing/preprocessors.py
      - data/processed/clean.parquet
    outs:
      - data/processed/features.parquet

  train:
    cmd: uv run python -m recomendador.training.train
    deps:
      - src/recomendador/training/train.py
      - src/recomendador/models/neural.py
      - data/processed/features.parquet
    outs:
      - models/neural.pt
      - models/train_info.json

  evaluate:
    cmd: uv run python -m recomendador.evaluation.evaluate
    deps:
      - src/recomendador/evaluation/evaluate.py
      - src/recomendador/evaluation/metrics.py
      - src/recomendador/models/baseline.py
      - models/neural.pt
    metrics:
      - metrics.json:
          cache: false